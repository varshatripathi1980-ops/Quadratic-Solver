<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solution</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:Inter,sans-serif;
    background:#0f0f0f;
    color:white;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    color:black;
    padding:25px;
    border-radius:16px;
    margin-bottom:20px;
}

h2{
    margin-bottom:15px;
    color:#ff5722;
}

pre{
    white-space:pre-wrap;
    line-height:1.7;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:white;
}
</style>
</head>
<body>

<div class="container">

<a class="back" href="index.html">
← Back
</a>

<div class="card">
<h2>Equation</h2>
<p id="equation"></p>
</div>

<div class="card">
<h2>Roots</h2>
<div id="roots"></div>
</div>

<div class="card">
<h2>Quadratic Formula Working</h2>
<pre id="working"></pre>
</div>

<div class="card">
<h2>Factorisation</h2>
<div id="factorisation"></div>
</div>

<div class="card">
    <h2>Graph</h2>

    <canvas id="quadraticChart"></canvas>
</div>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const a=parseFloat(params.get("a"));
const b=parseFloat(params.get("b"));
const c=parseFloat(params.get("c"));

document.getElementById("equation").innerHTML=
`${a}x² + ${b}x + ${c} = 0`;

const d=b*b-4*a*c;

let rootsHTML="";

if(d>0){

const x1=(-b+Math.sqrt(d))/(2*a);
const x2=(-b-Math.sqrt(d))/(2*a);

rootsHTML=`
<p>x₁ = ${x1.toFixed(4)}</p>
<p>x₂ = ${x2.toFixed(4)}</p>
`;

}
else if(d===0){

const x=-b/(2*a);

rootsHTML=`
<p>x = ${x.toFixed(4)}</p>
`;

}
else{

const real=(-b/(2*a)).toFixed(4);
const imag=(Math.sqrt(-d)/(2*a)).toFixed(4);

rootsHTML=`
<p>x₁ = ${real}+${imag}i</p>
<p>x₂ = ${real}-${imag}i</p>
`;

}

document.getElementById("roots").innerHTML=rootsHTML;

document.getElementById("working").textContent=
`Given:

a = ${a}
b = ${b}
c = ${c}

D = b² − 4ac

D = (${b})² − 4(${a})(${c})

D = ${d}

x = (-b ± √D)/(2a)

Substituting values:

x = (-(${b}) ± √${d})/(2×${a})

Final roots shown above.
`;

if(Number.isInteger(Math.sqrt(d))){

document.getElementById("factorisation").innerHTML=
"Possible factorisation exists (advanced implementation can be added).";

}
else{

document.getElementById("factorisation").innerHTML=
"Simple integer factorisation not available.";

}

</script>

</body>
</html>
